name: Security Audit
on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
      - name: Run cargo audit
        run: cargo audit
